<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
		<title>station</title>
		<style>
html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
}

body {
	color: white;
	background-color: #cad0d6;
	overflow: hidden;
	touch-action: none;
}

#canvas {
	display: block;
}

#canvas:focus {
	outline: none;
}

#status, #status-progress {
	position: absolute;
	left: 0;
	right: 0;
}

#status {
	top: 0;
	bottom: 0;
}

#status {
	background:
		radial-gradient(circle at top, rgba(160, 176, 191, 0.5), transparent 42%),
		linear-gradient(180deg, #d5dae0 0%, #bcc4cc 100%);
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	visibility: hidden;
}

#status-shell {
	display: flex;
	flex-direction: column;
	align-items: center;
	gap: 18px;
	padding: 32px 24px;
	width: min(360px, calc(100vw - 48px));
	border: 1px solid rgba(182, 209, 224, 0.14);
	border-radius: 22px;
	background: linear-gradient(180deg, rgba(242, 245, 248, 0.96), rgba(219, 225, 231, 0.96));
	box-shadow: 0 24px 70px rgba(44, 56, 66, 0.22);
	backdrop-filter: blur(10px);
	box-sizing: border-box;
}

#status-splash {
	width: 132px;
	height: 132px;
	object-fit: contain;
	filter: drop-shadow(0 10px 24px rgba(0, 0, 0, 0.35));
}

#status-splash.show-image--false {
	display: none;
}

#status-splash.fullsize--true {
	height: 132px;
	width: 132px;
	object-fit: contain;
}

#status-splash.use-filter--false {
	image-rendering: pixelated;
}

#status-title {
	font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
	font-size: 22px;
	font-weight: 600;
	letter-spacing: 0.08em;
	color: rgba(33, 42, 50, 0.96);
	text-transform: uppercase;
	text-align: center;
}

#status-subtitle {
	font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
	font-size: 13px;
	letter-spacing: 0.12em;
	color: rgba(78, 93, 106, 0.88);
	text-align: center;
}

#status-progress, #status-notice {
	display: none;
}

#status-progress {
	position: static;
	width: 100%;
	height: 8px;
	appearance: none;
	border: 0;
	border-radius: 999px;
	overflow: hidden;
	background: rgba(162, 188, 204, 0.16);
}

#status-progress::-webkit-progress-bar {
	background: rgba(162, 188, 204, 0.16);
	border-radius: 999px;
}

#status-progress::-webkit-progress-value {
	background: linear-gradient(90deg, #4ba7d6 0%, #88d6ff 100%);
	border-radius: 999px;
}

#status-progress::-moz-progress-bar {
	background: linear-gradient(90deg, #4ba7d6 0%, #88d6ff 100%);
	border-radius: 999px;
}

#status-notice {
	background-color: #5b3943;
	border-radius: 0.5rem;
	border: 1px solid #9b3943;
	color: #e0e0e0;
	font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
	line-height: 1.3;
	margin: 0 2rem;
	overflow: hidden;
	padding: 1rem;
	text-align: center;
	z-index: 1;
}

#godot-badge {
	position: absolute;
	right: 18px;
	bottom: 18px;
	display: flex;
	align-items: center;
	gap: 8px;
	padding: 8px 10px;
	border-radius: 999px;
	background: rgba(8, 12, 16, 0.74);
	border: 1px solid rgba(164, 189, 206, 0.14);
	box-shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
	backdrop-filter: blur(6px);
	color: rgba(228, 238, 244, 0.9);
	font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
	font-size: 12px;
	letter-spacing: 0.06em;
	text-transform: uppercase;
	pointer-events: none;
}

#godot-badge img {
	width: 22px;
	height: 22px;
	display: block;
	border-radius: 6px;
}

				<progress id="status-progress"></progress>
				<div id="status-notice"></div>
			</div>

		<script src="odf_manage.js"></script>
		<script>
const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":true,"executable":"odf_manage","experimentalVK":false,"fileSizes":{"odf_manage.pck":110208,"odf_manage.wasm":1601076},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4,"serviceWorker":"odf_manage.service.worker.js"};
const GODOT_THREADS_ENABLED = true;
const engine = new Engine(GODOT_CONFIG);
const GODOT_ROOM_ID_KEY = 'godot_selected_room_id';

(function () {
	let hasUserInteracted = false;

	function markUserInteracted() {
		hasUserInteracted = true;
	}

	function isCloseShortcut(event) {
		return (event.ctrlKey || event.metaKey) && !event.altKey && String(event.key).toLowerCase() === 'w';
	}

	window.addEventListener('pointerdown', markUserInteracted, { capture: true, passive: true });
	window.addEventListener('keydown', function (event) {
		markUserInteracted();
		if (!isCloseShortcut(event)) {
			return;
		}
		event.preventDefault();
		event.stopImmediatePropagation();
		const canvas = document.getElementById('canvas');
		if (canvas) {
			canvas.focus();
		}
	}, { capture: true });
	window.addEventListener('beforeunload', function (event) {
		if (!hasUserInteracted) {
			return;
		}
		event.preventDefault();
		event.returnValue = '';
		return '';
	});
}());

(function () {
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');
	let godotInstance = null;

	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			statusOverlay.remove();
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('An unknown error occurred.');
		}
		setStatusMode('notice');
		initializing = false;
	}

	function saveRoomId(id) {
		if (id === null || id === undefined || id === '') {
			return;
		}
		localStorage.setItem(GODOT_ROOM_ID_KEY, String(id));
	}

	function getSavedRoomId() {
		return localStorage.getItem(GODOT_ROOM_ID_KEY);
	}

	function getRoomIdFromQuery() {
		const queryId = new URLSearchParams(window.location.search).get('id');
		if (queryId) {
			return queryId;
		}
		return null;
	}

	function sendRoomIdToGodot(id) {
		if (id === null || id === undefined || id === '') {
			return false;
		}
		saveRoomId(id);
		if (!godotInstance) {
			return false;
		}
		console.log('Godot 已启动，station id 已写�?localStorage，等待godot应用侧读�?', id);
		return true;
	}

	function handleRoomEvent(detail) {
		if (!detail) {
			return;
		}
		const roomId = detail.id ?? detail.stationId;
		saveRoomId(roomId);
		if (!sendRoomIdToGodot(roomId)) {
			console.log('Godot 尚未启动，已暂存 room id:', roomId);
		}
	}

	window.addEventListener('godot-load-room', function (e) {
		handleRoomEvent(e.detail);
	});

	window.addEventListener('message', function (e) {
		var data = e.data;
		if (!data) {
			return;
		}

		if (data.type === 'godot-load-room') {
			handleRoomEvent(data.detail || { id: data.id, stationId: data.stationId });
		}
	});

	const queryRoomId = getRoomIdFromQuery();
	if (queryRoomId) {
		console.log('�?iframe URL 读取 station id:', queryRoomId);
		saveRoomId(queryRoomId);
	}

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			let serviceWorkerRegistrationPromise;
			try {
				serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
			} catch (err) {
				serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
			}
			// There's a chance that installing the service worker would fix the issue
			Promise.race([
				serviceWorkerRegistrationPromise.then((registration) => {
					if (registration != null) {
						return Promise.reject(new Error('Service worker already exists.'));
					}
					return registration;
				}).then(() => engine.installServiceWorker()),
				// For some reason, `getRegistration()` can stall
				new Promise((resolve) => {
					setTimeout(() => resolve(), 2000);
				}),
			]).then(() => {
				// Reload if there was no error.
				window.location.reload();
			}).catch((err) => {
				console.error('Error while registering service worker:', err);
			});
		} else {
			// Display the message as usual
			const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
			displayFailureNotice(missingMsg + missing.join('\n'));
		}
	} else {
		setStatusMode('progress');
		engine.startGame({
			'onProgress': function (current, total) {
				if (current > 0 && total > 0) {
					statusProgress.value = current;
					statusProgress.max = total;
				} else {
					statusProgress.removeAttribute('value');
					statusProgress.removeAttribute('max');
				}
			},
		}).then(() => {
			setStatusMode('hidden');
			godotInstance = engine.instance || engine;
			if (window.parent && window.parent !== window) {
				window.parent.postMessage({ type: 'godot-ready' }, window.location.origin);
			}
			const savedRoomId = getSavedRoomId() || getRoomIdFromQuery();
			if (savedRoomId) {
				console.log('Godot 启动后补�?station id:', savedRoomId);
				sendRoomIdToGodot(savedRoomId);
			}
		}, displayFailureNotice);
	}
}());
		</script>
